---
- name: Cleanup all Windows Daily Demo AWS resources across all regions
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    cleanup_regions:
      - us-east-1
      - us-west-2
      - eu-west-1
      - ap-southeast-1
    demo_vpc_name: windows-dailydemo_service.ansible
    demo_vpc_cidr: 172.16.2.0/24
    demo_secgrp_name: windows-dailydemo_SECGRP
    demo_rt_name: windows-dailydemo_RT_Internet

  tasks:

    - name: Look up demo VPCs per region
      loop: "{{ cleanup_regions }}"
      register: all_vpcs
      amazon.aws.ec2_vpc_net_info:
        region: "{{ item }}"
        filters:
          "tag:Name": "{{ demo_vpc_name }}"

    - name: Build region-to-vpc-id map
      ansible.builtin.set_fact:
        regions_with_vpcs: >-
          {{ all_vpcs.results
             | selectattr('vpcs', 'ne', [])
             | map(attribute='item')
             | list }}
        vpc_ids_by_region: >-
          {{ dict(all_vpcs.results
             | selectattr('vpcs', 'ne', [])
             | map(attribute='item')
             | zip(all_vpcs.results
                   | selectattr('vpcs', 'ne', [])
                   | map(attribute='vpcs')
                   | map(attribute=0)
                   | map(attribute='vpc_id')
                   | list)) }}

    - name: Find ALL instances in demo VPCs (any environment tag)
      loop: "{{ regions_with_vpcs }}"
      register: all_instances
      amazon.aws.ec2_instance_info:
        region: "{{ item }}"
        filters:
          vpc-id: "{{ vpc_ids_by_region[item] }}"
          instance-state-name: [running, stopped, shutting-down, stopping]

    - name: Terminate all instances in demo VPCs
      loop: "{{ all_instances.results }}"
      when: item.instances | length > 0
      amazon.aws.ec2_instance:
        region: "{{ item.item }}"
        state: absent
        instance_ids: "{{ item.instances | map(attribute='instance_id') | list }}"
        wait: true
        wait_timeout: 300

    - name: Pause 30s for ENIs and public IPs to be released after termination
      ansible.builtin.pause:
        seconds: 30

    - name: Find any remaining ENIs in demo VPCs
      loop: "{{ regions_with_vpcs }}"
      register: all_enis
      amazon.aws.ec2_eni_info:
        region: "{{ item }}"
        filters:
          vpc-id: "{{ vpc_ids_by_region[item] }}"

    - name: Build flat list of ENIs to delete
      ansible.builtin.set_fact:
        enis_to_delete: >-
          {{ enis_to_delete | default([]) +
             (item.network_interfaces
              | map('combine', {'_region': item.item})
              | list) }}
      loop: "{{ all_enis.results }}"
      when: item.network_interfaces | length > 0

    - name: Delete stale ENIs
      loop: "{{ enis_to_delete | default([]) }}"
      loop_control:
        label: "{{ item.id }} in {{ item._region }}"
      amazon.aws.ec2_eni:
        region: "{{ item._region }}"
        eni_id: "{{ item.id }}"
        state: absent
      ignore_errors: true

    - name: Remove Internet Gateways
      loop: "{{ regions_with_vpcs }}"
      register: igw_result
      until: igw_result is not failed
      retries: 8
      delay: 15
      amazon.aws.ec2_vpc_igw:
        region: "{{ item }}"
        vpc_id: "{{ vpc_ids_by_region[item] }}"
        state: absent

    - name: Remove subnets
      loop: "{{ regions_with_vpcs }}"
      amazon.aws.ec2_vpc_subnet:
        region: "{{ item }}"
        vpc_id: "{{ vpc_ids_by_region[item] }}"
        cidr: "{{ demo_vpc_cidr }}"
        state: absent

    - name: Gather route tables
      loop: "{{ regions_with_vpcs }}"
      register: all_rts
      amazon.aws.ec2_vpc_route_table_info:
        region: "{{ item }}"
        filters:
          "tag:Name": "{{ demo_rt_name }}"
          vpc-id: "{{ vpc_ids_by_region[item] }}"

    - name: Remove route tables
      loop: "{{ all_rts.results }}"
      when: item.route_tables | length > 0
      amazon.aws.ec2_vpc_route_table:
        region: "{{ item.item }}"
        vpc_id: "{{ item.route_tables[0].vpc_id }}"
        route_table_id: "{{ item.route_tables[0].id }}"
        lookup: id
        state: absent

    - name: Remove security groups
      loop: "{{ regions_with_vpcs }}"
      amazon.aws.ec2_security_group:
        region: "{{ item }}"
        name: "{{ demo_secgrp_name }}"
        vpc_id: "{{ vpc_ids_by_region[item] }}"
        state: absent

    - name: Remove VPCs
      loop: "{{ regions_with_vpcs }}"
      amazon.aws.ec2_vpc_net:
        region: "{{ item }}"
        vpc_id: "{{ vpc_ids_by_region[item] }}"
        state: absent

    - name: Get all hosts in AAP Managed Inventory
      register: inventory_hosts
      awx.awx.host_info:
        controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
        controller_oauth_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') }}"
        validate_certs: false
        inventory: AAP Managed Inventory

    - name: Remove stale demo hosts from AAP inventory
      loop: "{{ inventory_hosts.hosts }}"
      loop_control:
        label: "{{ item.name }}"
      when: "'compute.amazonaws.com' in item.name"
      awx.awx.host:
        controller_host: "{{ lookup('env', 'CONTROLLER_HOST') }}"
        controller_oauth_token: "{{ lookup('env', 'CONTROLLER_OAUTH_TOKEN') }}"
        validate_certs: false
        name: "{{ item.name }}"
        inventory: AAP Managed Inventory
        state: absent

    - name: Summary
      loop: "{{ all_instances.results }}"
      ansible.builtin.debug:
        msg: "{{ item.item }}: terminated {{ item.instances | length }} instance(s)"
