    us-west-2: ami-0d081196e3df05f4d      # Windows Server 2022 Base - Oregon
    eu-west-1: ami-0b45ae66668865cd8      # Windows Server 2022 Base - Ireland
    ap-southeast-1: ami-0df7a207adb9748c7  # Windows Server 2022 Base - Singapore
  "2019":
